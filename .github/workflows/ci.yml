name: CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install dependencies (Python services)
        run: |
          pip install pylint pytest pytest-cov

          for service in services/anomaly services/llm-reasoner services/orchestrator services/executor-agent; do
            if [ -f "$service/requirements.txt" ]; then
              pip install -r "$service/requirements.txt"
            fi
          done
      - name: Lint with pylint
        run: |
          for service in services/anomaly services/llm-reasoner services/orchestrator services/executor-agent; do
            echo "=== Linting $service ==="
            pylint "$service/app" --fail-under=8.0 || exit 1
          done
      - name: Test with pytest
        run: |
          for service in services/anomaly services/llm-reasoner services/orchestrator services/executor-agent; do
            if [ -d "$service/tests" ]; then
              echo "=== Testing $service ==="
              pytest "$service/tests" --cov="$service/app" --cov-report=term --cov-report=xml --cov-fail-under=70 || exit 1
            fi
          done
      - name: Build and test Java service
        run: |
          mvn -f services/ingestion/pom.xml clean verify
      - name: Install yamllint
        run: pip install yamllint
      - name: Lint YAML files
        run: |
          cat > .yamllint-config <<EOF
          extends: default
          rules:
            line-length: disable
            indentation:
              spaces: consistent
          EOF
          yamllint -c .yamllint-config docker-compose.yml charts/ .github/workflows/ || exit 1

  build-and-scan:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker images
        run: |
          SERVICES="ingestion anomaly llm-reasoner orchestrator executor-agent dashboard"
          for service in $SERVICES; do
            IMAGE="ghcr.io/${{ github.repository }}/$service:${{ github.sha }}"
            echo "=== Building $service ==="
            docker build -f "services/$service/Dockerfile" -t "$IMAGE" . || exit 1
          done
