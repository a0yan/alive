apiVersion: v1
kind: Service
metadata:
  name: {{ include "anomaly.fullname" . }}
  labels:
    {{- include "anomaly.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: metrics
    protocol: TCP
    name: metrics
  selector:
    {{- include "anomaly.selectorLabels" . | nindent 4 }}
