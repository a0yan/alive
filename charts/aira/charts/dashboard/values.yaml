replicaCount: 1

image:
  repository: aira/dashboard
  tag: latest

imagePullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3001

orchestratorUrl: http://orchestrator:8089

resources:
  requests:
    memory: 256Mi
    cpu: 250m
  limits:
    memory: 512Mi
    cpu: 500m

global:
  kafkaBootstrapServers: kafka:29092
