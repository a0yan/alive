apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "executor-agent.fullname" . }}
  labels:
    {{- include "executor-agent.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "executor-agent.fullname" . }}
  labels:
    {{- include "executor-agent.labels" . | nindent 4 }}
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "patch", "update"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "delete"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "executor-agent.fullname" . }}
  labels:
    {{- include "executor-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "executor-agent.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "executor-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
