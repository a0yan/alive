apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ingestion.fullname" . }}
  labels:
    {{- include "ingestion.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ingestion.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ingestion.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: ingestion
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.imagePullPolicy | default "IfNotPresent" }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          value: {{ .Values.global.kafkaBootstrapServers | quote }}
        - name: SERVER_TOMCAT_ACCESSLOG_ENABLED
          value: "true"
        - name: OTEL_SERVICE_NAME
          value: "ingestion-service"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://jaeger:4317"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "grpc"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
