apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llm-reasoner.fullname" . }}
  labels:
    {{- include "llm-reasoner.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "llm-reasoner.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llm-reasoner.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: llm-reasoner
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.imagePullPolicy | default "IfNotPresent" }}
        ports:
        - name: metrics
          containerPort: 8082
          protocol: TCP
        env:
        - name: KAFKA_BROKER
          value: {{ .Values.global.kafkaBootstrapServers | quote }}
        - name: LLM_PROVIDER
          value: {{ .Values.config.llmProvider | quote }}
        - name: LLM_MODEL
          value: {{ .Values.config.llmModel | quote }}
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "llm-reasoner.fullname" . }}-secrets
              key: openai-api-key
              optional: true
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "llm-reasoner.fullname" . }}-secrets
              key: anthropic-api-key
              optional: true
        livenessProbe:
          httpGet:
            path: /health
            port: metrics
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: metrics
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
