apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llm-reasoner.fullname" . }}-secrets
  labels:
    {{- include "llm-reasoner.labels" . | nindent 4 }}
type: Opaque
data:
  openai-api-key: {{ .Values.secrets.openaiApiKey | b64enc | quote }}
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
