global:
  scrape_interval: 5s # Scrape often for dev

scrape_configs:
  - job_name: 'ingestion-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ingestion:8080']

  - job_name: 'anomaly-detector'
    static_configs:
      - targets: ['anomaly-detector:8001']

  - job_name: 'llm-reasoner'
    static_configs:
      - targets: ['llm-reasoner:8082']

  - job_name: 'orchestrator'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['orchestrator:8089']

  - job_name: 'executor-agent'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['executor-agent:8090']