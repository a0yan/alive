server.port=8080
spring.application.name=ingestion-service

# ─── Kafka Producer ────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BROKER:kafka:29092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Throughput: batch up to 64 KB, wait 20 ms before flushing — ideal for 50k events/sec
spring.kafka.producer.properties.linger.ms=20
spring.kafka.producer.properties.batch.size=65536

# Snappy compression: ~3x reduction on JSON payloads, CPU cost is negligible
spring.kafka.producer.properties.compression.type=snappy

# 64 MB in-memory buffer — prevents send() blocking under burst traffic
spring.kafka.producer.properties.buffer.memory=67108864

# Leader-ack only (acks=1): best throughput/durability tradeoff for a single-broker setup
# Switch to acks=all when Kafka is multi-broker
spring.kafka.producer.properties.acks=1

# Retry transient errors (leader election, network hiccups)
spring.kafka.producer.retries=3
spring.kafka.producer.properties.retry.backoff.ms=100

# Block send() for up to 5s before throwing; prevents indefinite caller stall
spring.kafka.producer.properties.max.block.ms=5000

# ─── Tomcat Thread Pool ─────────────────────────────────────────────────────────
# At 50k events/sec across N horizontal instances, each instance handles ~50k/N req/sec.
# 400 threads + 200 accept queue = headroom for burst spikes without 503s.
server.tomcat.threads.max=400
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=200
server.tomcat.connection-timeout=20000

# ─── Actuator / Observability ────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always
# Tag every metric with the service name — essential for multi-service Grafana queries
management.metrics.tags.application=ingestion-service
